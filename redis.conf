# Redis config — shared by LiveKit SIP (DB 0) and the app cache/sessions (DB 1).
# Mounted into the redis container at /usr/local/etc/redis/redis.conf

# ----- Persistence: AOF (durability for session state) -----
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
dir /data

# AOF auto-rewrite (compacts the log when it grows)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots too — fast restart + backup. Redis runs both; AOF wins on restart.
save 900 1
save 300 10

# ----- Memory safety -----
maxmemory 256mb
# volatile-lru: evict ONLY keys that have a TTL (our cache + sessions).
# LiveKit's coordination keys (no TTL) are never evicted under memory pressure.
maxmemory-policy volatile-lru